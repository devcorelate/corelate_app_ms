name: Build and Push List Service

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1
          role-session-name: GitHubActions-List-Build
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Generate image tags
        id: meta
        run: |
          echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "branch=$(echo ${GITHUB_REF#refs/heads/} | sed 's/\//-/g')" >> $GITHUB_OUTPUT
          echo "version=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image with Jib
        run: |
          echo "Building List service..."
          IMAGE_BASE=689635266888.dkr.ecr.ap-southeast-1.amazonaws.com/bpmn/corelate_list_ms
          
          # Build and push with immutable tags only
          mvn clean compile jib:build \
            -Djib.to.image=${IMAGE_BASE}:${{ github.sha }} \
            -Djib.to.tags=${{ steps.meta.outputs.sha_short }},${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.timestamp }},${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.build_number }}-${{ steps.meta.outputs.sha_short }}
      
      - name: Image details
        run: |
          echo "✅ Successfully built and pushed List service"
          echo "Image: 689635266888.dkr.ecr.ap-southeast-1.amazonaws.com/bpmn/corelate_list_ms"
          echo "Tags (all immutable):"
          echo "  - ${{ github.sha }} (full commit SHA)"
          echo "  - ${{ steps.meta.outputs.sha_short }} (short commit SHA)"
          echo "  - ${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.timestamp }} (branch + timestamp)"
          echo "  - ${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.build_number }}-${{ steps.meta.outputs.sha_short }} (version + build + SHA)"

      - name: Update K8s Manifest
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/CORELATESYSCORP/bpmn-k8s-manifests.git /tmp/manifests
          cd /tmp/manifests
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B deploy/list-ms
          sed -i "s|image:.*bpmn/corelate_list_ms:.*|image: 689635266888.dkr.ecr.ap-southeast-1.amazonaws.com/bpmn/corelate_list_ms:${{ github.sha }}|" base/services/list-ms/deployment.yaml
          git add base/services/list-ms/deployment.yaml
          git commit -m "deploy(list-ms): ${{ github.sha }}"
          git push -f origin deploy/list-ms
          gh pr create --repo CORELATESYSCORP/bpmn-k8s-manifests --base main --head deploy/list-ms --title "deploy(list-ms): ${{ github.sha }}" --body "Automated image update for list-ms" || true
