server:
  port: 8085
spring:
  application:
    name: "app"
  #  profiles:
  #    active: "prod"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:appdb}
#    url: jdbc:postgresql://localhost:5435/appdb
    username: postgres
    password: password
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLInnoDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: update #update , create , create-drop , none , validate
    show-sql: true
    properties:
      hibernate:
        globallly_qouted_identifiers: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  #  servlet:
  #    multipart:
  #      enable: true
  #      max-file-size: 1000MB
  #      max-request-size: 1000MB
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_HOST:config-service}:${CONFIG_SERVER_PORT:8071}/"
  cloud:
    openfeign:
      circuitbreaker:
        enabled: false
    function:
      definition: updateCommunication
    stream:
      bindings:
        updateCommunication-in-0:
          destination: communication-sent
          group: ${spring.application.name}
        sendCommunication-out-0:
          destination: send-communication
      kafka:
        binder:
          brokers:
            - ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    shutdown:
      enabled: true
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

endpoints:
  shutdown:
    enabled: true

metrics:
  tags:
    application: ${spring.application.name}

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8070}/eureka/

info:
  app:
    name: "app"
    description: "Corelate Application Builder"
    version: "1.0.0"

logging:
  level:
    com:
      corelate:
        app: DEBUG
    org.apache.kafka: OFF
    org.springframework.kafka: OFF
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      permittedNumberOfCallsInHalfOpenState: 2
      failureRateThreshold: 50
      waitDurationInOpenState: 10000

resilience4j.retry:
  configs:
    default:
      maxRetryAttempts: 3
      waitDuration: 500
      enableExponentialBackoff: true
      exponentialBackoffMultiplier: 2
      ignoreExceptions:
        - java.lang.NullPointerException
      retryExceptions:
        - java.util.concurrent.TimeoutException

resilience4j.ratelimiter:
  configs:
    default:
      timeoutDuration: 1000
      limitRefreshPeriod: 5000
      limitForPeriod: 1

app:
  form-label-fetch:
    batch-size: 100
    max-retries: 3
    initial-backoff-ms: 100
    jitter-ms: 50

encrypt:
  key: WEd0VcO8pyygSprR0UZRe7ENxaG2aV
